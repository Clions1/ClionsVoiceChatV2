<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clions Voice Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="text-center">Clions Sesli Sohbet Sitesi</h1>
            <p class="text-center">
                <b>Bağlanmak için arkadaşınızın kullanıcı adını girin.</b>
            </p>
            <div class="user-info">
                <span>Hoş geldiniz, <strong id="currentUsername"></strong></span>
                <button id="logoutBtn" class="btn btn-outline-light btn-sm">Çıkış Yap</button>
            </div>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
                <em>Dark Mode</em>
            </div>
        </div>
    </header>
    <main>
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <input type="text" id="friendIdInput" class="form-control mb-3" placeholder="Arkadaşınızın kullanıcı adı">
                    <div class="d-flex justify-content-center gap-2">
                        <button id="startCall" class="btn btn-primary">Görüşmeye Başla</button>
                        <button id="muteButton" class="btn btn-secondary">Mikrofonu Kapat</button>
                        <button id="startScreenShare" class="btn btn-success">
                            <i class="fas fa-desktop"></i>
                            Ekran Paylaş
                        </button>
                    </div>
                    <p class="mt-3">
                        <b>Sizin Kullanıcı Adınız:</b> <span id="myId"></span>
                    </p>
                </div>
            </div>

            <div id="participants" class="mt-4">
                <h2>Katılımcılar:</h2>
                <ul id="participantList" class="list-group"></ul>
            </div>

            <audio id="localAudio" autoplay muted></audio>
            <audio id="remoteAudio" autoplay></audio>

            <div id="screenShareWindow" class="mt-4">
                <h2>Ekran Paylaşımı</h2>
                <div class="video-container">
                    <video id="screenShareVideo" autoplay muted></video>
                    <div class="video-controls">
                        <button class="control-button" id="playPauseBtn" title="Oynat/Duraklat">
                            <i class="fas fa-play"></i>
                        </button>
                        <input type="range" class="time-slider" id="timeSlider" min="0" max="100" value="0">
                        <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                        <div class="volume-control-container">
                            <button class="control-button" id="muteBtn" title="Ses Aç/Kapat">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <input type="range" class="volume-control" id="volumeSlider" min="0" max="100" value="100">
                        </div>
                        <button class="control-button" id="fullscreenBtn" title="Tam Ekran">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>
                <div id="screenShareControls">
                    <button id="startScreenShare" class="btn btn-success">
                        <i class="fas fa-desktop"></i>
                        Ekran Paylaşımını Başlat
                    </button>
                    <button id="stopScreenShare" class="btn btn-danger">
                        <i class="fas fa-stop"></i>
                        Ekran Paylaşımını Durdur
                    </button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        &copy; 2024 Developed by Clions. All rights reserved.
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Bootstrap JS -->

    <!-- Peer JS -->
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- Peer JS -->

    <!-- Auth JS -->
    <script src="auth.js"></script>
    <!-- Auth JS -->

    <!-- App JS -->
    <script src="script.js"></script>
    <!-- App JS -->
</body>
</html>
